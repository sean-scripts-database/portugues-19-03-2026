<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atividade Português 19/03/2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #333;
        }

        .container {
            background-color: white;
            padding: 3rem;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 500px;
            width: 90%;
        }

        h1 {
            margin-bottom: 2rem;
            color: #2c3e50;
            font-weight: 600;
            font-size: 1.8rem;
        }

        .button-grid {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .btn {
            text-decoration: none;
            color: white;
            background-color: #4a90e2;
            padding: 15px 25px;
            border-radius: 12px;
            font-weight: 400;
            transition: all 0.3s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        .btn:hover {
            background-color: #357abd;
            transform: translateY(-3px);
            box-shadow: 0 6px 12px rgba(0,0,0,0.15);
        }

        .btn:active {
            transform: translateY(-1px);
        }

        /* Cores diferentes para cada parte para dar um toque profissional */
        .btn-1 { background-color: #4a90e2; }
        .btn-2 { background-color: #50c878; }
        .btn-3 { background-color: #f39c12; }
        .btn-4 { background-color: #e74c3c; }

        footer {
            margin-top: 2rem;
            font-size: 0.8rem;
            color: #7f8c8d;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Atividade Português<br>19/03/2026</h1>
        
        <div class="button-grid">
            <a href="https://drive.google.com/file/d/1MZ-JJRpYFMKyIbIFHcyEeImGjw38XZNg/view?usp=drivesdk" target="_blank" class="btn btn-1">Acessar Parte 1</a>
            
            <a href="https://drive.google.com/file/d/1-H37SeauDVZxlebG1SrNpYYILE3p1-bm/view?usp=drivesdk" target="_blank" class="btn btn-2">Acessar Parte 2</a>
            
            <a href="https://drive.google.com/file/d/11N9OJKTT1HlZWvrkpAHMcWa9cvRjAjE5/view?usp=drivesdk" target="_blank" class="btn btn-3">Acessar Parte 3</a>
            
            <a href="https://drive.google.com/file/d/121EEuOSyXJ6UQlfqiqgdu8Q1fH8dJgE-/view?usp=drivesdk" target="_blank" class="btn btn-4">Acessar Parte 4</a>
        </div>

        <footer>
            Organizado para estudos facilitados.
        </footer>
    </div>

</body>
</html>
